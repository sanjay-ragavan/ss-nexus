<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <g fill="#5b8cff" opacity="0.5">
    <!-- palm tree -->
    <path d="M90,260 L90,170" stroke="#5b8cff" stroke-width="6" fill="none"/>
    <path d="M90,175 Q50,150 30,160" fill="none" stroke="#5b8cff" stroke-width="4"/>
    <path d="M90,175 Q130,150 150,160" fill="none" stroke="#5b8cff" stroke-width="4"/>
    <path d="M90,170 Q60,140 50,120" fill="none" stroke="#5b8cff" stroke-width="4"/>
    <path d="M90,170 Q120,140 130,120" fill="none" stroke="#5b8cff" stroke-width="4"/>
    <path d="M90,170 Q90,130 90,105" fill="none" stroke="#5b8cff" stroke-width="4"/>

    <!-- paddy rows -->
    <g stroke="#5b8cff" stroke-width="3" stroke-linecap="round">
      <path d="M210,260 L214,210"/>
      <path d="M230,260 L234,205"/>
      <path d="M250,260 L254,212"/>
      <path d="M270,260 L274,206"/>
      <path d="M290,260 L294,210"/>
      <path d="M310,260 L314,205"/>
    </g>

    <!-- temple gopuram silhouette -->
    <polygon points="520,150 560,150 545,120 535,120"/>
    <polygon points="500,180 580,180 560,152 520,152"/>
    <polygon points="480,210 600,210 580,182 500,182"/>
    <rect x="470" y="210" width="140" height="50"/>

    <!-- ascending bars -->
    <rect x="760" y="200" width="30" height="60"/>
    <rect x="800" y="170" width="30" height="90"/>
    <rect x="840" y="140" width="30" height="120"/>
    <rect x="880" y="110" width="30" height="150"/>

    <!-- truck -->
    <rect x="990" y="190" width="60" height="35"/>
    <rect x="1050" y="170" width="80" height="55"/>
    <circle cx="1015" cy="228" r="10"/>
    <circle cx="1110" cy="228" r="10"/>
  </g>
</svg>
